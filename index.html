  <!-- Theme initialization script to prevent flicker -->
  <script>
    (function () {
      try {
        var THEME_COLORS = {
          coral: { primary: "#ff6f3c", primaryHover: "#ff5722", primaryLight: "rgba(255, 111, 60, 0.1)", primaryBorder: "rgba(255, 111, 60, 0.4)" },
          orange: { primary: "#c2410c", primaryHover: "#9a3412", primaryLight: "rgba(194, 65, 12, 0.1)", primaryBorder: "rgba(194, 65, 12, 0.4)" },
          blue: { primary: "#3b82f6", primaryHover: "#2563eb", primaryLight: "rgba(59, 130, 246, 0.1)", primaryBorder: "rgba(59, 130, 246, 0.4)" },
          purple: { primary: "#a855f7", primaryHover: "#9333ea", primaryLight: "rgba(168, 85, 247, 0.1)", primaryBorder: "rgba(168, 85, 247, 0.4)" },
          emerald: { primary: "#2ecc40", primaryHover: "#27ae60", primaryLight: "rgba(46, 204, 64, 0.1)", primaryBorder: "rgba(46, 204, 64, 0.4)" },
          slate: { primary: "#64748b", primaryHover: "#475569", primaryLight: "rgba(100, 116, 139, 0.1)", primaryBorder: "rgba(100, 116, 139, 0.4)" },
          pesto: { primary: "#A89A04", primaryHover: "#8a7e03", primaryLight: "rgba(168, 154, 4, 0.1)", primaryBorder: "rgba(168, 154, 4, 0.4)" },
          teal: { primary: "#0d9488", primaryHover: "#0f766e", primaryLight: "rgba(13, 148, 136, 0.1)", primaryBorder: "rgba(13, 148, 136, 0.4)" }
        };
        var root = document.documentElement;
        var themeColor = localStorage.getItem("theme-color") || "blue";
        var colors = THEME_COLORS[themeColor] || THEME_COLORS.blue;

        root.style.setProperty("--color-primary", colors.primary);
        root.style.setProperty("--color-primary-hover", colors.primaryHover);
        root.style.setProperty("--color-primary-light", colors.primaryLight);
        root.style.setProperty("--color-primary-border", colors.primaryBorder);

        var metaTheme = document.querySelector('meta[name="theme-color"]');
        var metaTile = document.querySelector('meta[name="msapplication-TileColor"]');
        var metaNav = document.querySelector('meta[name="msapplication-navbutton-color"]');
        if (metaTheme) metaTheme.setAttribute("content", colors.primary);
        if (metaTile) metaTile.setAttribute("content", colors.primary);
        if (metaNav) metaNav.setAttribute("content", colors.primary);

        var themeMode = localStorage.getItem("theme-mode");
        if (themeMode === "light") {
          root.classList.remove("dark");
        } else if (themeMode === "dark" || !themeMode) {
          root.classList.add("dark");
        }
      } catch (e) { }
    })();
  </script>
